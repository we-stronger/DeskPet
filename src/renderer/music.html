<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网易云音乐 · Desk Pet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="music-window">
    <main class="music-window__main" aria-label="网易云音乐">
      <header class="music-window__header">
        <div class="music-window__title">
          <h1>网易云音乐</h1>
          <span id="music-window-profile" class="music-window__profile">未登录</span>
        </div>
      </header>
      <nav class="music-window__tabs" role="tablist">
        <button class="music-window__tab is-active" data-tab="search" role="tab" aria-selected="true">搜索</button>
        <button class="music-window__tab" data-tab="playlists" role="tab" aria-selected="false">我的歌单</button>
        <button class="music-window__tab" data-tab="daily" role="tab" aria-selected="false">每日推荐</button>
        <button class="music-window__tab" data-tab="charts" role="tab" aria-selected="false">热门榜单</button>
        <button class="music-window__tab" data-tab="fm" role="tab" aria-selected="false">私人 FM</button>
      </nav>
      <div class="music-window__searchbar" data-searchbar>
        <input id="music-window-search-input" type="search" placeholder="搜索歌曲 / 歌手 / 专辑" maxlength="80" aria-label="搜索" />
        <button id="music-window-search-btn" type="button">搜索</button>
      </div>
      <div class="music-window__navrow" data-navrow hidden>
        <button id="music-window-back-btn" type="button" class="music-window__back-btn">← 返回</button>
        <span id="music-window-nav-title" class="music-window__nav-title"></span>
      </div>
      <div id="music-window-status" class="music-window__status" aria-live="polite"></div>
      <div id="music-window-content" class="music-window__content"></div>
    </main>
    <script src="./music-search-view.js"></script>
    <script src="./music-playlist-view.js"></script>
    <script src="./audio-player.js"></script>
    <script src="./music-playback-service.js"></script>
    <script src="./music.js"></script>
  </body>
</html>
